<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ArbiRush | Web3 Survival Game</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>
  :root {
    --primary: #FACC15; /* Vibrant Yellow */
    --primary-dark: #EAB308;
    --bg: #0A0A0F;
    --surface: #13131A;
    --surface2: #1C1C28;
    --border: #2A2A3A;
    --text: #F0F0F8;
    --muted: #6B6B85;
    --green: #00E676;
    --red: #FF4444;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    padding: 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--primary); }
  
  .wallet-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: bold;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .wallet-pill:hover { border-color: var(--primary); }

  /* MAIN SCREEN */
  .screen { padding: 20px 14px; }

  /* GAME CARD */
  .round-card {
    background: var(--surface);
    border: 1px solid var(--primary-dark);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 15px;
    box-shadow: 0 0 15px rgba(250, 204, 21, 0.1);
  }

  /* STATS ROW */
  .reward-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(250, 204, 21, 0.05);
    border: 1px solid rgba(250, 204, 21, 0.15);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 15px;
  }
  .reward-label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
  .reward-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--primary); }

  /* TIMER */
  .timer-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  .timer-label { font-size: 12px; color: var(--muted); letter-spacing: 1px; margin-bottom: 5px; }
  .timer-val {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 42px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 10px rgba(255,255,255,0.2);
  }
  .timer-val.danger { color: var(--red); text-shadow: 0 0 10px rgba(255, 68, 68, 0.4); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.98); } }

  /* BUTTONS */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 15px;
  }
  
  .btn {
    padding: 14px 10px;
    border-radius: 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all 0.2s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-sub { font-size: 10px; font-weight: 400; font-family: 'Space Mono', monospace; opacity: 0.8; }

  .btn-free {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-free:hover:not(:disabled) { border-color: var(--primary); }
  .btn-free:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-paid {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #0A0A0F;
    box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
  }
  .btn-paid:hover { filter: brightness(1.1); }

  .btn-full {
    width: 100%;
    margin-bottom: 10px;
    font-size: 15px;
    padding: 16px;
  }

  .btn-claim {
    background: var(--green);
    color: #0A0A0F;
    display: none; /* Hidden by default */
  }

  /* COOLDOWN BAR */
  .cooldown-wrap { margin-top: 5px; width: 80%; display: none; }
  .cooldown-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .cooldown-fill { height: 100%; background: var(--primary); width: 100%; transition: width 1s linear; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--primary); border-radius: 20px;
    padding: 12px 24px; font-size: 12px; font-weight: bold; color: var(--primary);
    z-index: 300; opacity: 0; pointer-events: none; transition: all 0.3s; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

</style>
</head>
<body>

<div class="header">
  <div class="logo">Arbi<span>Rush</span></div>
  <button class="wallet-pill" id="connectWalletBtn" onclick="connectWallet()">Connect Wallet</button>
</div>

<div class="screen active">

  <div class="round-card">
    
    <div class="reward-row">
      <div>
        <div class="reward-label">Reward Pool</div>
        <div class="reward-val" id="rewardPoolUi">0.000 ETH</div>
      </div>
      <div style="text-align:right">
        <div class="reward-label">Current Leader</div>
        <div class="reward-val" style="font-size:14px; color:var(--text);" id="currentLeaderUi">0x000...000</div>
      </div>
    </div>

    <div class="timer-box">
      <div class="timer-label">🔴 GAME ENDS IN</div>
      <div class="timer-val" id="countdownTimer">00:00:00</div>
    </div>

    <div class="action-row" id="activeGameButtons">
      
      <button class="btn btn-free" id="btnFreePush" onclick="handleFreePush()">
        🆓 FREE PUSH
        <span class="btn-sub" id="freeSubText">Subject to cooldown</span>
        
        <div class="cooldown-wrap" id="cooldownWrap">
            <div class="cooldown-bar"><div class="cooldown-fill" id="cooldownFill"></div></div>
        </div>
      </button>

      <button class="btn btn-paid" id="btnPaidRush" onclick="handlePaidRush()">
        💰 PAID RUSH
        <span class="btn-sub">0.0003 ETH</span>
      </button>

    </div>

    <button class="btn btn-full btn-free" style="border-color: var(--primary); color: var(--primary);" id="btnStartGame" onclick="handleStartGame()">
      🚀 START NEW ROUND
      <span class="btn-sub">Requires 0.000363 ETH</span>
    </button>

    <button class="btn btn-full btn-claim" id="btnClaimReward" onclick="handleClaimReward()">
      🏆 CLAIM REWARD POOL
      <span class="btn-sub">Timer has ended!</span>
    </button>

  </div>

</div>

<div class="toast" id="toastBox">Message here</div>

  // --- DUMMY UI UPDATE ENGINE (To see how UI reacts) ---
  // In real app, fetch these from getGameData()
  let isGameActive = true;
  let timerSeconds = 65; // 1 min 5 seconds

  function updateTimerUI() {
    if(!isGameActive) return;

    if(timerSeconds > 0) {
        timerSeconds--;
        const h = String(Math.floor(timerSeconds / 3600)).padStart(2, '0');
        const m = String(Math.floor((timerSeconds % 3600) / 60)).padStart(2, '0');
        const s = String(timerSeconds % 60).padStart(2, '0');
        
        const timerEl = document.getElementById('countdownTimer');
        timerEl.textContent = `${h}:${m}:${s}`;
        
        // Turn Red if less than 60 seconds
        if(timerSeconds <= 60) {
            timerEl.classList.add('danger');
        } else {
            timerEl.classList.remove('danger');
        }
    } else {
        // TIMER HIT ZERO
        isGameActive = false;
        document.getElementById('countdownTimer').textContent = "00:00:00";
        document.getElementById('countdownTimer').classList.remove('danger');
        
        // Hide normal buttons, show CLAIM button
        document.getElementById('activeGameButtons').style.display = 'none';
        document.getElementById('btnStartGame').style.display = 'none';
        document.getElementById('btnClaimReward').style.display = 'block';
    }
  }

  // Start the dummy timer
  setInterval(updateTimerUI, 1000);

</script>
</body>
</html>
